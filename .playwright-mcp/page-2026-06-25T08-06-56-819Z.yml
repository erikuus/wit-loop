    - paragraph [ref=e6]: A plain-language record of a blind search for one stronger ending
  - main [ref=e7]:
    - generic [ref=e8]:
      - generic [ref=e9]: What this is
      - paragraph [ref=e10]: This project starts with one sentence opening, asks for many possible endings, and keeps only the strongest one.
      - paragraph [ref=e11]:
        - text: "The opening never changes:"
        - strong [ref=e12]: i’m lonely, please
        - text: . Everything else is a competition between endings.
      - generic [ref=e13]:
        - generic [ref=e14]: Current best
        - blockquote [ref=e15]: i’m lonely, please put me in a group chat so I can be ignored at scale
        - paragraph [ref=e16]:
          - text: As of June 25, 2026, the leading line scores
          - strong [ref=e17]: 80/100
          - text: .
    - generic [ref=e18]:
      - generic [ref=e19]: How it was built
      - paragraph [ref=e20]: The loop is deliberately simple. It tries to protect fresh attempts from copying the current winner.
      - generic [ref=e21]:
        - article [ref=e22]:
          - paragraph [ref=e23]: 1. Writer
          - paragraph [ref=e24]: A writer sees only the beginning and proposes one ending.
        - article [ref=e25]:
          - paragraph [ref=e26]: 2. Judge
          - paragraph [ref=e27]: A judge sees only that ending and scores it against a fixed scorecard.
        - article [ref=e28]:
          - paragraph [ref=e29]: 3. Gatekeeper
          - paragraph [ref=e30]: Plain code checks the arithmetic and updates the winner only when the new score is strictly higher.
      - generic [ref=e31]:
        - paragraph [ref=e32]: Why the blindness matters
        - paragraph [ref=e33]: Because the writer does not see the best line, each attempt has to think for itself. Because the judge does not compare lines directly, the score history stays traceable instead of becoming a taste contest in disguise.
    - generic [ref=e34]:
      - generic [ref=e35]: What counts as wit here
      - paragraph [ref=e36]: The scorecard uses seven criteria. In the table below, the raw criteria columns are scored from 0 to 5, while the final score is scaled to 100.
      - generic [ref=e37]:
        - article [ref=e38]:
          - paragraph [ref=e39]: Criterion 1
          - heading "Reversal and logic" [level=3] [ref=e40]
          - paragraph [ref=e41]: The ending should turn the opening in a way that is surprising but still clean.
        - article [ref=e42]:
          - paragraph [ref=e43]: Criterion 2
          - heading "Precision" [level=3] [ref=e44]
          - paragraph [ref=e45]: The key words should feel exact, not like easy filler.
        - article [ref=e46]:
          - paragraph [ref=e47]: Criterion 3
          - heading "Compression" [level=3] [ref=e48]
          - paragraph [ref=e49]: The line should do a lot with very few words.
        - article [ref=e50]:
          - paragraph [ref=e51]: Criterion 4
          - heading "Quotable shape" [level=3] [ref=e52]
          - paragraph [ref=e53]: The full sentence should sound finished and memorable.
        - article [ref=e54]:
          - paragraph [ref=e55]: Criterion 5
          - heading "Freshness" [level=3] [ref=e56]
          - paragraph [ref=e57]: The idea should feel new without looking desperate to be clever.
        - article [ref=e58]:
          - paragraph [ref=e59]: Criterion 6
          - heading "Human truth" [level=3] [ref=e60]
          - paragraph [ref=e61]: The joke should reveal something real about people, not just juggle words.
        - article [ref=e62]:
          - paragraph [ref=e63]: Criterion 7
          - heading "Elegance" [level=3] [ref=e64]
          - paragraph [ref=e65]: The line should move lightly rather than feeling clumsy or overbuilt.
