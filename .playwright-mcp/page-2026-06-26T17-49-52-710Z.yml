      - generic [ref=e2049]:
        - paragraph [ref=e2050]: Rida, millest kõik algas
        - paragraph [ref=e2051]: "Kogu ettevõtmise lähteimpulsiks oli Melissa Broderi rida:"
        - blockquote [ref=e2052]: I am lonely, please leave me alone.
      - generic [ref=e2053]:
        - paragraph [ref=e2054]: See on peaaegu täiuslik, sest ta on nii lühike, et midagi ei jõua peitu minna. Teine pool peegeldab esimest nii täpselt, et lause murdub iseenda vastu tagasi.
        - paragraph [ref=e2055]: "See on naljakas, kuid mitte õhukeselt. Ühes lugemises teeb see nalja enesedramatiseeriva üksinduse üle. Teises lugemises muutub rida palju tõsisemaks: eemalolek on kaitse, mitte poos."
        - paragraph [ref=e2056]: "Ja veel sügavamal tasandil muutub üksiolek kaitseks kiindumise, leina ja kaotuse vastu. Just sellist vaimukust see tsükkel otsibki: tihe, kurb, naljakas ja sügavam, kui ta esmapilgul paistab."
