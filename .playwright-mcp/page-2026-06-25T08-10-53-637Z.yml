      - generic [ref=e1573]: Rida, millest kõik algas
      - paragraph [ref=e1574]: "Kogu tsükli lähterida oli Melissa Broderi rida:"
      - blockquote [ref=e1576]: I am lonely, please leave me alone.
      - paragraph [ref=e1577]: See on peaaegu täiuslik, sest ta on nii lühike, et midagi ei saa peitu pugeda. Teine pool peegeldab esimest nii tihedalt, et lause pöördub iseenda vastu tagasi.
      - paragraph [ref=e1578]: See on naljakas, aga mitte pealiskaudselt. Ühes lugemises ironiseerib ta enesehaletseva üksilduse üle. Teises lugemises kirjeldab ta täpselt seda, kuidas ärevus kasutab kaugust kaitsekihina.
      - paragraph [ref=e1579]: "Veel sügavamal tasandil muutub üksiolek kaitseks kiindumise, leina ja kaotuse vastu. Just sellist vaimukust see tsükkel püüab: kokku surutud, kurb, naljakas ja targem, kui ta esmapilgul paistab."
