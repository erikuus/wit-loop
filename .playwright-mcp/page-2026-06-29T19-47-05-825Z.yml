    - generic [ref=e52]:
      - heading "Tsükkel" [level=2] [ref=e53]
      - paragraph [ref=e54]: Tsükkel on selle katse süda. Kuidas see töötab ja miks on see vajalik? Kui paluksime samal AI-vestlusel järjest uusi variante pakkuda ja neid ka ise hinnata, hakkaks süsteem mäletama oma varasemaid mõtteid, eelistama juba leitud radu ja õigustama omaenda otsuseid. Selle vältimiseks jagasime töö kolmeks. Kaks esimest komponenti, looja ja hindaja, on AI-agendid, mis käivituvad kindla aja tagant. Kui hindaja on lõpetanud, teeb viimase sammu tavaline skript. Ja mõne aja pärast see tsükkel kordub.
