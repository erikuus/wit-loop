          - paragraph [ref=e11]: A plain-language account of a blind loop searching for one sharper ending
          - paragraph [ref=e12]: "This project is trying to answer one narrow question: if a sentence already has a strong beginning, can a blind loop keep searching until it finds a stronger ending?"
