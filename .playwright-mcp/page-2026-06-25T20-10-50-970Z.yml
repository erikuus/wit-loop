    - generic [ref=e33]:
      - generic [ref=e34]:
        - paragraph [ref=e35]: How it was built
        - paragraph [ref=e36]: The loop is intentionally spare. Instead of letting one model refine its own answer, it creates many separate attempts and protects them from seeing too much.
        - list [ref=e37]:
          - listitem [ref=e38]:
            - paragraph [ref=e39]: 1. Writer
            - paragraph [ref=e40]: A writer sees only the beginning and proposes one ending.
          - listitem [ref=e41]:
            - paragraph [ref=e42]: 2. Judge
            - paragraph [ref=e43]: A judge sees only that ending and scores it against a fixed scorecard.
          - listitem [ref=e44]:
            - paragraph [ref=e45]: 3. Gatekeeper
            - paragraph [ref=e46]: Plain code checks the arithmetic and updates the winner only when the new score is strictly higher.
      - complementary [ref=e47]:
        - paragraph [ref=e48]: Why the blindness matters
        - paragraph [ref=e49]: Because the writer never sees the incumbent, each attempt has to arrive fresh. Because the judge scores one line at a time, the history stays legible instead of collapsing into opaque taste comparisons.
    - generic [ref=e50]:
      - paragraph [ref=e51]: What counts as wit here
      - paragraph [ref=e52]: "The scorecard is trying to reward a very particular kind of wit: compact, exact, and carrying more than one thought at once. In the table below, the raw criteria columns run from 0 to 5, while the final score is scaled to 100."
      - generic [ref=e53]:
        - article [ref=e54]:
          - paragraph [ref=e55]: Criterion 1
          - heading "Reversal and logic" [level=3] [ref=e56]
          - paragraph [ref=e57]: The ending should turn the opening in a way that is surprising but still clean.
        - article [ref=e58]:
          - paragraph [ref=e59]: Criterion 2
          - heading "Precision" [level=3] [ref=e60]
          - paragraph [ref=e61]: The key words should feel exact, not like easy filler.
        - article [ref=e62]:
          - paragraph [ref=e63]: Criterion 3
          - heading "Compression" [level=3] [ref=e64]
          - paragraph [ref=e65]: The line should do a lot with very few words.
        - article [ref=e66]:
          - paragraph [ref=e67]: Criterion 4
          - heading "Quotable shape" [level=3] [ref=e68]
          - paragraph [ref=e69]: The full sentence should sound finished and memorable.
        - article [ref=e70]:
          - paragraph [ref=e71]: Criterion 5
          - heading "Freshness" [level=3] [ref=e72]
          - paragraph [ref=e73]: The idea should feel new without looking desperate to be clever.
        - article [ref=e74]:
          - paragraph [ref=e75]: Criterion 6
          - heading "Human truth" [level=3] [ref=e76]
          - paragraph [ref=e77]: The joke should reveal something real about people, not just juggle words.
        - article [ref=e78]:
          - paragraph [ref=e79]: Criterion 7
          - heading "Elegance" [level=3] [ref=e80]
          - paragraph [ref=e81]: The line should move lightly rather than feeling clumsy or overbuilt.
