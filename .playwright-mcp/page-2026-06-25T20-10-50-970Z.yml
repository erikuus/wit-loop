        - paragraph [ref=e1746]: The line that started it
        - paragraph [ref=e1747]: "The whole exercise begins from Melissa Broder's line:"
        - blockquote [ref=e1748]: I am lonely, please leave me alone.
      - generic [ref=e1749]:
        - paragraph [ref=e1750]: It is almost perfect because it leaves no room to hide. The second half mirrors the first so closely that the sentence turns back on itself like a snapped hinge.
        - paragraph [ref=e1751]: "It is funny, but not cheaply funny. One reading mocks the performance of loneliness. Another makes the line darker: distance is not vanity, but a defense against fear, intimacy, and exposure."
        - paragraph [ref=e1752]: That doubleness is the real target here. The best wit is tight, sad, funny, and deeper than it first appears. The loop is not just searching for a punchline. It is searching for that density.
